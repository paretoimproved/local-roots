name: Billing Authorize Pending

on:
  schedule:
    # Hourly: authorizations should happen within the 7-day window without relying on manual actions.
    - cron: "17 * * * *"
  workflow_dispatch:

jobs:
  authorize:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Authorize pending orders
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          INTERNAL_CRON_SECRET: ${{ secrets.INTERNAL_CRON_SECRET }}
        run: |
          if [[ -z "$API_BASE_URL" ]]; then
            echo "Missing secret: API_BASE_URL"
            exit 1
          fi
          if [[ -z "$INTERNAL_CRON_SECRET" ]]; then
            echo "Missing secret: INTERNAL_CRON_SECRET"
            exit 1
          fi

          curl -fsS \
            -X POST "$API_BASE_URL/v1/internal/billing/authorize-pending" \
            -H "Authorization: Bearer $INTERNAL_CRON_SECRET" \
            -H "Content-Type: application/json" \
            --retry 3 \
            --retry-delay 2

